<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px 36px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 1.6rem;
            color: #1a1a2e;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #444;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #357abd;
        }

        .btn-login:disabled {
            background-color: #a0c4f1;
            cursor: not-allowed;
        }

        .message {
            margin-top: 14px;
            text-align: center;
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 6px;
            display: none;
        }

        .message.success {
            background-color: #e6f4ea;
            color: #2e7d32;
            display: block;
        }

        .message.error {
            background-color: #fdecea;
            color: #c62828;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required />
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required />
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
        </form>
        <div class="message" id="mensagem"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const inputNome = document.getElementById('nome');
            const inputSenha = document.getElementById('senha');
            const nome = inputNome.value.trim();
            const senha = inputSenha.value;
            const btn = document.getElementById('btnLogin');
            const mensagem = document.getElementById('mensagem');

            mensagem.className = 'message';
            mensagem.textContent = '';

            btn.disabled = true;
            btn.textContent = 'Entrando...';


            try {
                const response = await fetch('http://localhost:8080/usuario/logar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({nome, senha})
                });

                if (response.ok) {
                    const data = await response.json().catch(() => null);
                    mensagem.classList.add('success');
                    mensagem.textContent = 'Login realizado com sucesso!';
                    inputNome.disabled = true;
                    inputSenha.disabled = true;
                    setTimeout(() => {
                        window.location.href = 'logado.html';
                    }, 2000);
                } else {
                    const errorData = await response.json().catch(() => null);
                    mensagem.classList.add('error');
                    mensagem.textContent = errorData?.mensagem || 'Nome ou senha incorretos.';
                }
            } catch (err) {
                console.log('Erro ao conectar com o servidor:', err);
                mensagem.classList.add('error');
                mensagem.textContent = 'Erro ao conectar com o servidor.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
