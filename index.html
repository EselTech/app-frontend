<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
</head>

<body>

    <div id="impostos">

    </div>

</body>

</html>
<script>

    async function exibirTodos() {

        const resposta = await fetch("http://localhost:8080/api/bcb/find-all")
        const res = await resposta.json()
        console.log(res)

        res.forEach(imposto => {

            impostos.innerHTML += formatarImposto(imposto) + "<br>";

        });

    }

    async function inserirImposto(nome, codigo) {

        await fetch("http://localhost:8080/api/bcb/inserir-imposto", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeImposto: nome,
                codigoSgs: codigo
            })
        })

    }

    async function atualizarImposto() {
        await fetch("http://localhost:8080/api/bcb/atualizar-impostos", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            }
        })
    }

    async function deletarImposto(id) {
        await fetch(`http://localhost:8080/api/bcb/deletar-imposto/${id}`, {
            method: "DELETE",
            headers: {
                "Content-Type": "application/json"
            }
        })
    }

    function formatarData(data) {
        const dataObj = new Date(data);
        const dia = String(dataObj.getDate()).padStart(2, '0');
        const mes = String(dataObj.getMonth() + 1).padStart(2, '0');
        const ano = dataObj.getFullYear();
        return `${dia}/${mes}/${ano}`;
    }

    function formatarImposto(imposto) {
        return `Data Registro: ${formatarData(imposto.dataRegistro)} - Nome: ${imposto.nomeImposto} - Valor: ${formatarValorImposto(imposto)}`;
    }

    function formatarValorImposto(imposto) {
        return (imposto.valor * 100).toFixed(2) + '%';
    }

</script>
