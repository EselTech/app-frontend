<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
</head>

<body>

    <div id="impostos">

    </div>

</body>

</html>
<script>

    async function exibirTodos() {

        const resposta = await fetch("http://localhost:8080/api/bcb/find-all")
        const res = await resposta.json()
        console.log(res)

        res.forEach(imposto => {

            impostos.innerHTML += `Nome: ${imposto.nomeImposto} - Valor: ${imposto.valor}<br>`

        });

    }

    async function inserirImposto(nome, codigo) {

        await fetch("http://localhost:8080/api/bcb/inserir-imposto", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeImposto: nome,
                codigoSgs: codigo
            })
        })

    }

    async function atualizarImposto() {
        await fetch("http://localhost:8080/api/bcb/atualizar-impostos", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            }
        })
    }



</script>
