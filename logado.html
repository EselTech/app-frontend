<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Bem-vindo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 36px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .container h1 {
            font-size: 1.6rem;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .container p {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-block;
            padding: 11px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #4a90e2;
            color: #fff;
            margin-right: 8px;
        }

        .btn-primary:hover { background-color: #357abd; }

        .btn-secondary {
            background-color: #f0f2f5;
            color: #1a1a2e;
        }

        .btn-secondary:hover { background-color: #dde1e7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bem-vindo!</h1>
        <p>Você está logado com sucesso.</p>
        <a href="index.html" class="btn btn-primary">Ir para Impostos</a>
        <a href="login.html" class="btn btn-secondary">Sair</a>
    </div>
</body>
</html>
